<!DOCTYPE html>
<html>
<head>
    <title>Music Player</title>
    <link rel="stylesheet" href="musiccss.css">
</head>
<body>

<div class="player">

    <h2>🎵 Music Player</h2>

    <div class="cover">
        <img id="coverImage" src="">
    </div>

    <div class="song-info">
        <h3 id="title"></h3>
        <p id="artist"></p>
    </div>

    <audio id="audio"></audio>

    <input type="range" id="progress" value="0">

    <div class="time">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
    </div>

    <div class="controls">
        <button onclick="previousSong()">⏮</button>

        <button class="play-btn" onclick="playPause()">
            ▶
        </button>

        <button onclick="nextSong()">⏭</button>
    </div>

    <div class="volume-section">
        <label>🔊 Volume</label>
        <input type="range" id="volume"
        min="0" max="1" step="0.1" value="1">
    </div>

    <div class="playlist">
        <h3>Playlist</h3>

        <ul>
            <li onclick="selectSong(0)">Waka Waka</li>
            <li onclick="selectSong(1)">Shape of You</li>
            <li onclick="selectSong(2)">Espresso</li>
            <li onclick="selectSong(3)">Die With A Smile</li>
            <li onclick="selectSong(4)">Lovely</li>
        </ul>
    </div>

</div>

<script src="musicjs.js"></script>

</body>
</html>
